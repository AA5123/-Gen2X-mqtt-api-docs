<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Impinj Gen2X MQTT API - RapiDoc</title>
  <script type="module" src="https://unpkg.com/rapidoc/dist/rapidoc-min.js"></script>
</head>
<body>
  <rapi-doc
    spec-url="openapi.json"
    theme="dark"
    bg-color="#1b1b1b"
    text-color="#ccc"
    header-color="#2d87e2"
    primary-color="#2d87e2"
    nav-bg-color="#1b1b1b"
    nav-text-color="#aaa"
    nav-hover-bg-color="#333"
    nav-hover-text-color="#fff"
    nav-accent-color="#2d87e2"
    render-style="read"
    schema-style="table"
    show-header="true"
    show-info="true"
    allow-authentication="false"
    allow-server-selection="false"
    allow-try="false"
    show-components="true"
    schema-description-expanded="true"
    default-schema-tab="example"
  >
  </rapi-doc>
</body>
</html>
